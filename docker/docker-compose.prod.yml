version: '3.9'

# ═══════════════════════════════════════════════════════════
# docker-compose.prod.yml — Override de producción
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════

services:

  # ─── Nginx reverse proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sgci-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
      - portal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── API — producción ─────────────────────────────────────
  api:
    image: ${REGISTRY:-ghcr.io/tu-org}/sgci-api:${TAG:-latest}
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Staff web — producción ───────────────────────────────
  web:
    image: ${REGISTRY:-ghcr.io/tu-org}/sgci-web:${TAG:-latest}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.clinica.mx

  # ─── Portal paciente — producción ────────────────────────
  portal:
    image: ${REGISTRY:-ghcr.io/tu-org}/sgci-portal:${TAG:-latest}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.clinica.mx

  # ─── PostgreSQL — producción (deshabilitar puerto externo) ─
  postgres:
    ports: []                       # No exponer puerto en producción
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ─── Redis — producción ───────────────────────────────────
  redis:
    ports: []                       # No exponer puerto en producción
    restart: always

  # ─── RabbitMQ — producción (sin management UI) ────────────
  rabbitmq:
    image: rabbitmq:3.13-alpine     # Sin UI de management
    ports: []
    restart: always

  # ─── MinIO — producción ───────────────────────────────────
  minio:
    ports: []                       # No exponer en producción — usar HTTPS interno
    restart: always

volumes:
  nginx_logs:
