# ═══════════════════════════════════════════════════════════
# NGINX — Reverse proxy SGCI
# API: api.clinica.mx  → :4000
# Staff: app.clinica.mx → :3000
# Portal: portal.clinica.mx → :3001
# ═══════════════════════════════════════════════════════════

# Ajuste de workers
worker_processes auto;
events {
  worker_connections 1024;
  use epoll;
}

http {
  # ─── Tipos MIME ──────────────────────────────────────────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ─── Logging ─────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ─── Performance ─────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_vary          on;
  gzip_proxied       any;
  gzip_comp_level    6;
  gzip_types         text/plain text/css text/xml application/json
                     application/javascript application/xml+rss
                     application/atom+xml image/svg+xml;

  # ─── Seguridad ───────────────────────────────────────────
  server_tokens        off;
  add_header X-Content-Type-Options  "nosniff"                   always;
  add_header X-Frame-Options         "DENY"                      always;
  add_header X-XSS-Protection        "1; mode=block"             always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # ─── Rate limiting ────────────────────────────────────────
  limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=20r/s;
  limit_req_zone  $binary_remote_addr zone=auth_limit:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # ─── Upstreams ────────────────────────────────────────────
  upstream sgci_api {
    server api:4000;
    keepalive 32;
  }
  upstream sgci_web {
    server web:3000;
    keepalive 16;
  }
  upstream sgci_portal {
    server portal:3001;
    keepalive 16;
  }

  # ─── Redirect HTTP → HTTPS ────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ─── API — api.clinica.mx ─────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.clinica.mx;

    ssl_certificate     /etc/nginx/ssl/clinica.mx.crt;
    ssl_certificate_key /etc/nginx/ssl/clinica.mx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    # Rate limiting en autenticación
    location ~ ^/api/v1/auth/(login|patient/login) {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://sgci_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # Swagger — solo en staging (bloquear en prod cambiando a 403)
    location /api/docs {
      # En producción: return 403;
      proxy_pass http://sgci_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # API general
    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;
      limit_conn conn_limit 20;

      proxy_pass         http://sgci_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # WebSockets
    location /socket.io/ {
      proxy_pass         http://sgci_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 3600s;
    }

    # Health check sin rate limit
    location /api/v1/health {
      proxy_pass http://sgci_api;
      access_log off;
    }
  }

  # ─── Staff App — app.clinica.mx ───────────────────────────
  server {
    listen 443 ssl http2;
    server_name app.clinica.mx;

    ssl_certificate     /etc/nginx/ssl/clinica.mx.crt;
    ssl_certificate_key /etc/nginx/ssl/clinica.mx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Assets estáticos con caché largo
    location /_next/static/ {
      proxy_pass http://sgci_web;
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass         http://sgci_web;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;

      # Seguridad extra: solo IPs corporativas (descomentar en prod)
      # allow 200.XX.XX.XX;   # IP de la clínica
      # deny all;
    }
  }

  # ─── Portal Paciente — portal.clinica.mx ─────────────────
  server {
    listen 443 ssl http2;
    server_name portal.clinica.mx;

    ssl_certificate     /etc/nginx/ssl/clinica.mx.crt;
    ssl_certificate_key /etc/nginx/ssl/clinica.mx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # PWA manifest y service worker — sin caché
    location ~ ^/(manifest\.json|sw\.js)$ {
      proxy_pass http://sgci_portal;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      proxy_set_header Host $host;
    }

    # Assets estáticos
    location /_next/static/ {
      proxy_pass http://sgci_portal;
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass         http://sgci_portal;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }
}
